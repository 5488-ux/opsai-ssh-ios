name: ios-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild \
            -project OpsAI.xcodeproj \
            -scheme OpsAI \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Prepare signing assets
        if: ${{ secrets.IOS_P12_BASE64 != '' && secrets.IOS_MOBILEPROVISION_BASE64 != '' && secrets.IOS_TEAM_ID != '' && secrets.IOS_P12_PASSWORD != '' }}
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          mkdir -p $RUNNER_TEMP/signing
          echo "$IOS_P12_BASE64" | base64 --decode > $RUNNER_TEMP/signing/certificate.p12
          echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > $RUNNER_TEMP/signing/profile.mobileprovision

          security create-keychain -p runner build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p runner build.keychain
          security import $RUNNER_TEMP/signing/certificate.p12 -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/signing/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive app
        if: ${{ secrets.IOS_P12_BASE64 != '' && secrets.IOS_MOBILEPROVISION_BASE64 != '' && secrets.IOS_TEAM_ID != '' && secrets.IOS_P12_PASSWORD != '' }}
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild \
            -project OpsAI.xcodeproj \
            -scheme OpsAI \
            -configuration Release \
            -archivePath $RUNNER_TEMP/OpsAI.xcarchive \
            DEVELOPMENT_TEAM=$IOS_TEAM_ID \
            archive

      - name: Export IPA
        if: ${{ secrets.IOS_P12_BASE64 != '' && secrets.IOS_MOBILEPROVISION_BASE64 != '' && secrets.IOS_TEAM_ID != '' && secrets.IOS_P12_PASSWORD != '' }}
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/OpsAI.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload simulator build log context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opsai-build-context
          path: |
            OpsAI.xcodeproj
            project.yml

      - name: Upload IPA
        if: ${{ success() && secrets.IOS_P12_BASE64 != '' && secrets.IOS_MOBILEPROVISION_BASE64 != '' && secrets.IOS_TEAM_ID != '' && secrets.IOS_P12_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: opsai-ipa
          path: ${{ runner.temp }}/export/*.ipa
