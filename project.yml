name: OpsAI
options:
  bundleIdPrefix: com.opsai
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.opsai.app
packages: {}
targets:
  OpsAI:
    type: application
    platform: iOS
    sources:
      - path: OpsAI
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: OpsAI
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSFaceIDUsageDescription: Unlock saved server credentials and AI configuration.
    scheme:
      testTargets: []
