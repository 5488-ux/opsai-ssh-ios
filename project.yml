name: OpsAI
options:
  bundleIdPrefix: com.opsai
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: app.mango7143.test8374
    MARKETING_VERSION: 1.5
    CURRENT_PROJECT_VERSION: 5
packages:
  SSHClient:
    url: https://github.com/gaetanzanella/swift-ssh-client
    from: 0.1.4
targets:
  OpsAI:
    type: application
    platform: iOS
    sources:
      - path: OpsAI
    dependencies:
      - package: SSHClient
        product: SSHClient
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: OpsAI
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSFaceIDUsageDescription: Unlock saved server credentials and AI configuration.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          DEVELOPMENT_TEAM: $(IOS_TEAM_ID)
          PRODUCT_BUNDLE_IDENTIFIER: $(IOS_BUNDLE_ID)
          PROVISIONING_PROFILE_SPECIFIER: $(IOS_PROFILE_NAME)
    scheme:
      testTargets: []
